name: on push and after PR merge
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches:
      - main
    types:
      - closed
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    - name: Build
      run: go build -v ./...
    - name: Create .env file
      run: |
        echo "HOST_EMAIL=${{ secrets.HOST_EMAIL }}" >> .env
        echo "PASSWORD_EMAIL=${{ secrets.PASSWORD_EMAIL }}" >> .env
        echo "PASSWORD_EMAIL=${{ secrets.ACCESS_TOKEN_SECRET }}" >> .env
        echo "PASSWORD_EMAIL=${{ secrets.REFRESH_TOKEN_SECRET }}" >> .env
        echo "PASSWORD_EMAIL=${{ secrets.CACHE_LINK }}" >> .env
        echo "PASSWORD_EMAIL=${{ secrets.HOST_LINK }}" >> .env
        echo "PASSWORD_EMAIL=${{ secrets.DB_LINK }}" >> .env
        echo "PASSWORD_EMAIL=${{ secrets.PORT }}" >> .env
    - name: Test
      run: go test -v ./...
